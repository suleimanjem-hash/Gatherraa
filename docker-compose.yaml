services:
  # ── Application Services ─────────────────────────────────────────────────
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: gatheraa-backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    env_file:
      - ./app/backend/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - gatheraa-net
    restart: unless-stopped

  # ── Database ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gatheraa-db
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASS:-postgres}
      - POSTGRES_DB=${DB_NAME:-gatherraa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gatheraa-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-gatherraa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Monitoring & Performance Testing ────────────────────────────────────
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
    networks:
      - k6-net
      - gatheraa-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    volumes:
      - ./dashboards:/var/lib/grafana/dashboards
    networks:
      - k6-net
      - gatheraa-net

  redis:
    image: redis:alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      sh -c 'redis-server${REDIS_PASSWORD:+ --requirepass "$REDIS_PASSWORD"}'
    volumes:
      - redis_data:/data
    networks:
      - gatheraa-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  k6-net:
    driver: bridge
  gatheraa-net:
    driver: bridge